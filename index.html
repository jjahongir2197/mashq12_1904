{% extends 'base.html' %}
{% block title %}To-Do List{% endblock %}
{% block content %}
    <h1>To-Do Ro'yxati</h1>
    <form method="POST" action="/add">
        <input type="text" name="task" placeholder="Yangi vazifa..." required>
        <button type="submit">Qo'shish</button>
    </form>
    <ul>
    {% for todo in todos %}
        <li>
            <span style="text-decoration: {% if todo.done %}line-through{% else %}none{% endif %}">
                {{ todo.task }}
            </span>
            <a href="/done/{{ todo.id }}">✓</a>
            <a href="/delete/{{ todo.id }}">🗑</a>
        </li>
    {% endfor %}
    </ul>
{% endblock %}
